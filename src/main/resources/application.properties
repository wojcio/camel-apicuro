# Camel configuration
camel.main.name = bookstore-camel-app
camel.main.routes-include-pattern = classpath:camel/*.xml

# Kafka configuration - separate topics for each event type
kafka.brokers = localhost:9092
kafka.topic.books = bookstore-books
kafka.topic.orders = bookstore-orders
kafka.topic.shipments = bookstore-shipments
kafka.topic.dlq = bookstore-dlq
kafka.topic.expedited = bookstore-expedited

# Apicurio Registry configuration
apicurio.registry.url = http://localhost:8080/apis/registry/v2

# Log level
logging.level.org.apache.camel = INFO
