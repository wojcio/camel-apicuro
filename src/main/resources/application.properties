# Camel configuration
camel.main.name = bookstore-camel-app
camel.main.routes-include-pattern = classpath:camel/*.xml

# HTTP Server configuration (Netty)
http.port = 8082

# Kafka configuration - separate topics for each event type
kafka.brokers = localhost:9092
kafka.topic.books = bookstore-books
kafka.topic.orders = bookstore-orders
kafka.topic.shipments = bookstore-shipments
kafka.topic.dlq = bookstore-dlq
kafka.topic.expedited = bookstore-expedited

# Apicurio Registry configuration
apicurio.registry.url = http://localhost:8080/apis/registry/v2

# SQLite Database configuration
camel.sql.datasource = sqliteDataSource
sqlite.jdbc.url = jdbc:sqlite:bookstore.db
sqlite.jdbc.driver = org.sqlite.JDBC

# Camel Rest configuration
camel.rest.component = netty-http
camel.rest.host = 0.0.0.0
camel.rest.port = 8082
camel.rest.binding-mode = json

# Beans configuration
camel.beans.orderValidator = #class:com.example.bookstore.service.OrderValidator
camel.beans.orderFilter = #class:com.example.bookstore.strategy.OrderFilter
camel.beans.inventoryFilter = #class:com.example.bookstore.strategy.InventoryFilter
camel.beans.shipmentFilter = #class:com.example.bookstore.strategy.ShipmentFilter
camel.beans.shipmentFormatter = #class:com.example.bookstore.strategy.ShipmentFormatter
camel.beans.itemAggregationStrategy = #class:com.example.bookstore.strategy.ItemAggregationStrategy
camel.beans.orderAggregationStrategy = #class:com.example.bookstore.strategy.OrderAggregationStrategy
camel.beans.statisticsAggregationStrategy = #class:com.example.bookstore.strategy.StatisticsAggregationStrategy

# SQLite Database setup
camel.beans.sqliteDataSource = #class:org.sqlite.SQLiteDataSource
camel.beans.sqliteDataSource.url = ${sqlite.jdbc.url}

# Log level
logging.level.org.apache.camel = INFO
